name: Build unsigned app for iOS (for Altstore install)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  Build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies (Yarn)
        run: yarn install --frozen-lockfile

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: latest

      - name: Generate native iOS project (expo-prebuild)
        run: |
          npx expo prebuild --platform ios --clean

      - name: Build unsigned .ipa using xcodebuild
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)

          if [ -n "$WORKSPACE" ]; then
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              -allowProvisioningUpdates \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              BUNDLE_IN_DEBUG=true \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEAD_CODE_STRIPPING=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          else
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              BUNDLE_IN_DEBUG=true \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEAD_CODE_STRIPPING=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          fi

          cd build/pdfcraft-mobile.xcarchive/Products/Applications/

          mkdir Payload
          cp -R *.app Payload/

          ditto -c -k Payload $GITHUB_WORKSPACE/pdfcraft-mobile.ipa

          cd $GITHUB_WORKSPACE

      - name: Get direct download link for mobile
        run: |
          DOWNLOAD_URL=$(curl --upload-file ./pdfcraft-mobile.ipa https://transfer.sh/pdfcraft-mobile.ipa)
          echo "========================================================"
          echo "ССЫЛКА ДЛЯ СКАЧИВАНИЯ НА ТЕЛЕФОН:"
          echo "$DOWNLOAD_URL"
          echo "========================================================"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcraft-mobile
          path: ios/pdfcraft-mobile.ipa
          retention-days: 14