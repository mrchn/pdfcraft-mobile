name: Build unsigned app for iOS (for Altstore install)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  Build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies (Yarn)
        run: yarn install --frozen-lockfile

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: latest

      - name: Generate native iOS project (expo-prebuild)
        run: |
          npx expo prebuild --platform ios --clean

      - name: Bundle JavaScript
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.tsx \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Build unsigned .ipa using xcodebuild
        env:
          SKIP_BUNDLING: '1'
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)

          if [ -n "$WORKSPACE" ]; then
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              -allowProvisioningUpdates \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEAD_CODE_STRIPPING=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          else
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              -allowProvisioningUpdates \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEAD_CODE_STRIPPING=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          fi

          cd build/pdfcraft-mobile.xcarchive/Products/Applications/
          APP_NAME=$(ls -d *.app | head -n 1)

          mkdir -p "$GITHUB_WORKSPACE/Payload"
          ditto "$APP_NAME" "$GITHUB_WORKSPACE/Payload/$APP_NAME"
          cd $GITHUB_WORKSPACE
          zip -qr pdfcraft-mobile.ipa Payload/

      - name: Upload Payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcraft-ios
          path: pdfcraft-mobile.ipa
          retention-days: 14