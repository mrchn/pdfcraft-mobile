name: Build unsigned app for iOS (for Altstore install)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  Build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (Node.js)
        run: npm ci

      - name: Debug local module
        run: |
          pwd
          ls -la
          ls -la modules
          ls -la modules/ios-native-convert
          cat modules/ios-native-convert/package.json
          cat modules/ios-native-convert/expo-module.config.json
          npm ls ios-native-convert

      - name: Debug Expo autolinking
        run: |
          npx expo-modules-autolinking resolve --platform apple

      - name: Generate native iOS project (expo-prebuild)
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Inspect generated Podfile properties
        run: |
          cat ios/Podfile.properties.json || true

      - name: Resolve after prebuild
        run: |
          cd ios
          npx expo-modules-autolinking resolve --platform apple

      - name: Inspect Podfile
        run: |
          sed -n '1,120p' ios/Podfile

      - name: Check generated Podfile
        run: |
          grep -n "IosNativeConvert" ios/Podfile || true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Expo install (--check)
        run: |
          npx expo install --check

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Check Podfile.lock
        run: |
          grep -n "IosNativeConvert" ios/Podfile.lock || true

      - name: Check Pods project
        run: |
          find ios/Pods -iname "*IosNativeConvert*" || true
          grep -R "IosNativeConvert" ios/Pods || true

      - name: Build unsigned .ipa using xcodebuild
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)

          if [ -n "$WORKSPACE" ]; then
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              -allowProvisioningUpdates \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          else
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              -quiet \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=NO \
              DEBUG_INFORMATION_FORMAT=dwarf
          fi

          cd build/pdfcraft-mobile.xcarchive/Products/Applications/

          mkdir Payload
          cp -R *.app Payload/

          zip -r ../../../../pdfcraft-mobile.ipa Payload

          cd $GITHUB_WORKSPACE

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcraft-mobile
          path: ios/pdfcraft-mobile.ipa
          retention-days: 14