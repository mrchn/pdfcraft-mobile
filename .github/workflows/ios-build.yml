name: Build unsigned app for iOS (for Altstore install)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'false'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (Node.js)
        run: npm ci

      - name: Generate native iOS project (expo-prebuild)
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: Build unsigned .ipa using xcodebuild
        run: |
          cd ios
          pod install --repo-update

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)

          if [ -n "$WORKSPACE" ]; then
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

          cd build/pdfcraft-mobile.xcarchive/Products/Applications/

          mkdir Payload
          cp -R *.app Payload/

          zip -r ../../../../pdfcraft-mobile.ipa Payload

          cd $GITHUB_WORKSPACE

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcraft-mobile
          path: ios/pdfcraft-mobile.ipa
          retention-days: 14